name: Solar Portal
description: Solar energy monitoring portal with Home Assistant integration
version: 0.1.0
slug: solar_portal
codeowners:
  - "@honzik"
startup: application
boot: auto
arch:
  - aarch64
  - armhf
  - armv7
  - amd64
  - i386
ports:
  3000/tcp: Frontend
  5000/tcp: Backend API
options:
  log_level: info
  ha_url: "http://homeassistant:8123"
  frontend_port: 3000
  backend_port: 5000
schema:
  log_level: selector
  ha_url:
    selector:
      text:
        type: url
  frontend_port:
    selector:
      number:
        mode: box
        min: 1024
        max: 65535
  backend_port:
    selector:
      number:
        mode: box
        min: 1024
        max: 65535
requirements:
  - "docker"
