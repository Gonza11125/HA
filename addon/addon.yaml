name: Solar Portal
description: Solar energy monitoring portal with Home Assistant integration
version: 0.1.0
slug: solar_portal
url: https://github.com/Gonza11125/HA
codeowners:
  - "@honzik"
startup: application
boot: auto
arch:
  - aarch64
  - armhf
  - armv7
  - amd64
  - i386
ports:
  3000/tcp: Frontend
  5000/tcp: Backend API
options:
  log_level: info
  ha_url: "http://homeassistant:8123"
  frontend_port: 3000
  backend_port: 5000
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  ha_url: url
  frontend_port: port
  backend_port: port
requirements:
  - "docker"
