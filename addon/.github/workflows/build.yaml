name: Build Add-on

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/solar-portal

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'addon/**'
      - 'backend/**'
      - 'frontend/**'
      - 'agent/**'
      - '.github/workflows/build.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, armhf, armv7, amd64, i386]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./addon/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.arch }}-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-addon:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update addon.yaml with build info
        run: |
          # This would update addon.yaml with the new image tags
          # For now, just validate the structure
          jq . addon/addon.yaml

      - name: Create release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: addon-v${{ github.run_number }}
          release_name: Add-on Build ${{ github.run_number }}
          body: |
            Built from commit ${{ github.sha }}
            
            Available architectures:
            - aarch64 (64-bit ARM, e.g., RPi 4/5)
            - armhf (32-bit ARM, e.g., RPi Zero)
            - armv7 (32-bit ARM v7)
            - amd64 (Intel/AMD)
            - i386 (32-bit Intel)
          draft: false
          prerelease: false
